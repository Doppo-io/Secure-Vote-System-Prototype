version: '3.8'

services:
  # 1. The Immutable Ledger (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: election_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: securevote_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The High-Speed Token Store (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 3. The AI Workflow Orchestrator (n8n)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data: